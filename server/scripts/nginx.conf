# /etc/nginx/sites-available/solved-financial
# Symlink: sudo ln -s /etc/nginx/sites-available/solved-financial /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.yourdomain.com;   # ← replace with your actual API domain/IP

    # Redirect HTTP → HTTPS (uncomment once SSL is set up with certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload size limit (matches multer 5 MB + documents 20 MB)
        client_max_body_size 25M;
    }
}

